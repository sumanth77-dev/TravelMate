<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Travel Community — Payment</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="tm-auth.js"></script>
  <style>
    :root {
      --bg-background: #f8fafc;
      --bg-card: #ffffff;
      --bg-accent: #f1f5f9;
      --text-foreground: #0f172a;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
      --primary-light-bg: rgba(37, 99, 235, 0.1);
      --success: #10b981;
    }

    body {
      background: var(--bg-background);
      padding-top: 70px;
    }

    .payment-container {
      max-width: 480px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .back-button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.875rem;
      color: var(--text-muted);
      text-decoration: none;
      margin-bottom: 24px;
      transition: color 0.2s;
    }

    .back-button:hover { color: var(--text-foreground); }

    .payment-card {
      background: var(--bg-card);
      border-radius: 16px;
      border: 1px solid var(--border-color);
      padding: 24px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .card-header i {
      font-size: 1.25rem;
      color: var(--primary);
    }

    .card-header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-foreground);
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .summary-box {
      background: rgba(100, 116, 139, 0.05);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 24px;
    }

    .summary-name {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-foreground);
    }

    .summary-loc {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .summary-divider {
      height: 1px;
      background: var(--border-color);
      margin: 12px 0;
    }

    .summary-total {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .summary-total span.label {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .summary-total span.amount {
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--text-foreground);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-foreground);
      margin-bottom: 6px;
    }

    .form-control {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: var(--bg-background);
      padding: 10px 12px;
      font-size: 0.875rem;
      color: var(--text-foreground);
      outline: none;
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    
    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--primary-light-bg);
    }

    .secure-note {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .btn-submit {
      display: flex;
      width: 100%;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 0.875rem;
      font-weight: 600;
      font-family: 'Plus Jakarta Sans', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-submit:hover { opacity: 0.9; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Success State */
    .success-container {
      text-align: center;
      padding: 60px 24px;
      max-width: 400px;
      margin: 0 auto;
    }

    .success-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(16, 185, 129, 0.1);
      color: var(--success);
      font-size: 2rem;
      margin-bottom: 16px;
      animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .success-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-foreground);
      font-family: 'Plus Jakarta Sans', sans-serif;
      margin-bottom: 8px;
    }

    .success-desc {
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .btn-secondary {
      display: inline-block;
      background: var(--primary);
      color: white;
      text-decoration: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: opacity 0.2s;
    }

    .btn-secondary:hover { opacity: 0.9; }

    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- ══════════════ NAVBAR ══════════════ -->
  <nav class="navbar solid" id="navbar">
    <div class="navbar-inner">
      <a href="#" class="nav-logo">&#10022; Travel<span class="dot">Mate</span></a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="main_community.html">Community</a></li>
        <li><a href="findguides.html">Find Guides</a></li>
        <li><a href="destinations.html">Destinations</a></li>
      </ul>
      <div style="display:flex;align-items:center;gap:12px;">
        <div id="pointsCounter" class="badge badge-teal">0 pts</div>
      </div>
    </div>
  </nav>

  <div class="payment-container" id="paymentRoot">
    <!-- Rendered via JS -->
  </div>

  <script>
    let currentBooking = null;

    function initPayment() {
      const urlParams = new URL(window.location.href);
      const bookingId = urlParams.searchParams.get('id');
      
      const root = document.getElementById('paymentRoot');
      const stored = localStorage.getItem("bookings");
      
      if (!stored) {
        root.innerHTML = `<div style="text-align:center;padding:40px;"><p>No bookings found in system.</p><a href="guide-bookings.html">Go to Bookings</a></div>`;
        return;
      }

      const bookings = JSON.parse(stored);
      currentBooking = bookings.find(b => b.id === bookingId);

      // If no valid booking via URL, pick the first approved one for demo purposes
      if(!currentBooking) {
         currentBooking = bookings.find(b => b.status === 'approved');
      }

      if (!currentBooking) {
        root.innerHTML = `<div style="text-align:center;padding:40px;"><p>Invalid payment link or no approved bookings.</p><a href="guide-bookings.html">Go to Bookings</a></div>`;
        return;
      }

      const dateStr = new Date(currentBooking.date).toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" });

      root.innerHTML = `
        <a href="guide-bookings.html" class="back-button">
          <i class="fas fa-arrow-left"></i> Back
        </a>

        <div class="payment-card">
          <div class="card-header">
            <i class="far fa-credit-card"></i>
            <h1>Payment</h1>
          </div>

          <div class="summary-box">
            <div class="summary-name">${currentBooking.guideName}</div>
            <div class="summary-loc">${currentBooking.location} &middot; ${dateStr}</div>
            <div class="summary-divider"></div>
            <div class="summary-total">
              <span class="label">Total Amount</span>
              <span class="amount">₹${currentBooking.totalPrice.toLocaleString()}</span>
            </div>
          </div>

          <form id="paymentForm">
            <div class="form-group">
              <label>Card Number</label>
              <input type="text" id="ccInput" class="form-control" placeholder="1234 5678 9012 3456" required maxlength="19">
            </div>
            
            <div class="form-group">
              <label>Cardholder Name</label>
              <input type="text" id="nameInput" class="form-control" placeholder="John Doe" required>
            </div>

            <div class="secure-note">
              <i class="fas fa-lock"></i> Your payment information is secure
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
              <i class="far fa-credit-card"></i> Pay ₹${currentBooking.totalPrice.toLocaleString()}
            </button>
          </form>
        </div>
      `;

      // Auto-formatting Card Number input
      document.getElementById('ccInput').addEventListener('input', function(e) {
        let val = e.target.value.replace(/\D/g, '');
        let formatted = '';
        for(let i=0; i<val.length; i++) {
          if (i > 0 && i % 4 === 0) formatted += ' ';
          formatted += val[i];
        }
        e.target.value = formatted;
      });

      document.getElementById('paymentForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Processing...`;

        setTimeout(() => {
          showSuccess();
        }, 1500);
      });
    }

    function showSuccess() {
      const root = document.getElementById('paymentRoot');
      root.innerHTML = `
        <div class="success-container">
          <div class="success-icon">
            <i class="fas fa-check-circle"></i>
          </div>
          <h1 class="success-title">Payment Successful!</h1>
          <p class="success-desc">
            Your booking with ${currentBooking.guideName} is confirmed. ₹${currentBooking.totalPrice.toLocaleString()} has been securely charged.
          </p>
          <a href="guide-bookings.html" class="btn-secondary">View Bookings</a>
        </div>
      `;
    }

    document.addEventListener('DOMContentLoaded', initPayment);
  </script>
</body>
</html>
