<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - TravelMate</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="tm-auth.js"></script>
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #f0f5ff;
      padding-top: 0 !important;
    }

    /* ═══════════════════════════════════
       SPLIT PANEL AUTH LAYOUT
    ═══════════════════════════════════ */
    .auth-split {
      display: flex;
      min-height: 100vh;
    }

    /* LEFT PANEL — Blue gradient with waves */
    .auth-left {
      flex: 1;
      background: linear-gradient(155deg, #0f172a 0%, #1e3a8a 40%, #2563eb 70%, #3b82f6 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px 48px;
      position: relative;
      overflow: hidden;
      min-height: 100vh;
    }

    /* Decorative circles */
    .auth-left::before {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: rgba(59, 130, 246, 0.25);
      top: -80px;
      left: -60px;
      filter: blur(40px);
    }

    .auth-left::after {
      content: '';
      position: absolute;
      width: 250px;
      height: 250px;
      border-radius: 50%;
      background: rgba(96, 165, 250, 0.2);
      bottom: -50px;
      right: -40px;
      filter: blur(40px);
    }

    /* Dot pattern overlay */
    .auth-dots {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
    }

    /* Wave SVG at bottom */
    .auth-wave {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 1;
    }

    .auth-left-content {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 420px;
    }

    .auth-left-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 900;
      color: #fff;
      margin-bottom: 48px;
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
    }

    .auth-left-logo .dot {
      color: #60a5fa;
    }

    .auth-left-greeting {
      font-size: 1rem;
      color: #93c5fd;
      font-weight: 500;
      margin-bottom: 12px;
      letter-spacing: 0.05em;
    }

    .auth-left h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      font-weight: 900;
      color: #fff;
      line-height: 1.15;
      margin-bottom: 24px;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
    }

    .auth-left-desc {
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.65);
      line-height: 1.7;
      max-width: 360px;
      margin: 0 auto;
    }

    /* Floating travel icons */
    .float-icon {
      position: absolute;
      color: rgba(255, 255, 255, 0.12);
      font-size: 2rem;
      animation: floatUp 6s ease-in-out infinite;
    }

    .float-icon:nth-child(1) { top: 15%; left: 12%; animation-delay: 0s; }
    .float-icon:nth-child(2) { top: 25%; right: 15%; animation-delay: 1.5s; font-size: 1.6rem; }
    .float-icon:nth-child(3) { bottom: 25%; left: 18%; animation-delay: 3s; font-size: 1.8rem; }
    .float-icon:nth-child(4) { top: 60%; right: 10%; animation-delay: 2s; }
    .float-icon:nth-child(5) { bottom: 35%; right: 25%; animation-delay: 4s; font-size: 1.5rem; }

    @keyframes floatUp {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(5deg); }
    }

    /* RIGHT PANEL — White form */
    .auth-right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 40px;
      background: #fff;
    }

    .auth-form-container {
      width: 100%;
      max-width: 400px;
      animation: slideInForm 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideInForm {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .auth-form-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: #0f172a;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .auth-form-title span {
      color: #2563eb;
    }

    .auth-form-subtitle {
      font-size: 0.88rem;
      color: #64748b;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    /* Input fields */
    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #334155;
      margin-bottom: 7px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap .input-bar {
      position: absolute;
      left: 0;
      top: 12px;
      bottom: 12px;
      width: 3px;
      background: #2563eb;
      border-radius: 2px;
    }

    .input-wrap input,
    .input-wrap select {
      width: 100%;
      padding: 13px 14px 13px 18px;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      font-size: 14px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: #0f172a;
      background: #f8fafc;
      transition: all .2s;
      box-sizing: border-box;
    }

    .input-wrap input:focus,
    .input-wrap select:focus {
      outline: none;
      border-color: #2563eb;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.08);
    }

    .input-wrap input::placeholder {
      color: #94a3b8;
    }

    .toggle-pass {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }

    /* Role toggle */
    .role-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 22px;
    }

    .role-btn {
      flex: 1;
      padding: 10px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      background: #fff;
      font-size: 13px;
      font-weight: 600;
      color: #475569;
      cursor: pointer;
      transition: all .2s;
      font-family: 'Plus Jakarta Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .role-btn.active {
      border-color: #2563eb;
      background: #eff6ff;
      color: #1d4ed8;
    }

    /* Extras row */
    .extras-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .keep-signed {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #475569;
      cursor: pointer;
    }

    .keep-signed input[type="checkbox"] {
      accent-color: #2563eb;
      width: 16px;
      height: 16px;
    }

    .forgot-link {
      font-size: 13px;
      color: #2563eb;
      font-weight: 600;
      text-decoration: none;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    /* Submit button */
    .auth-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all .25s;
      font-family: 'Plus Jakarta Sans', sans-serif;
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.25);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .auth-btn:hover {
      background: linear-gradient(135deg, #1d4ed8, #1e40af);
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(37, 99, 235, 0.35);
    }

    .auth-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Divider */
    .or-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: #94a3b8;
      font-size: 13px;
      font-weight: 600;
    }

    .or-divider::before,
    .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }

    /* Google button wrapper — scales GSI button to full width */
    .google-btn-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 44px;
    }

    /* Scale the GSI iframe to fill the container */
    .google-btn-wrap > div,
    .google-btn-wrap iframe {
      width: 100% !important;
    }

    /* Fallback custom button (shown only if GSI fails) */
    .google-btn-fallback {
      width: 100%;
      padding: 12px;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 600;
      color: #334155;
      transition: all .2s;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .google-btn-fallback:hover {
      border-color: #2563eb;
      background: #eff6ff;
      transform: translateY(-1px);
    }

    /* Footer text */
    .auth-switch {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: #64748b;
    }

    .auth-switch a {
      color: #2563eb;
      font-weight: 600;
      text-decoration: none;
    }

    .auth-switch a:hover {
      text-decoration: underline;
    }

    /* Error display */
    .auth-error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .auth-error-msg.show {
      display: flex;
    }

    /* ═══════ RESPONSIVE ═══════ */
    @media (max-width: 860px) {
      .auth-split {
        flex-direction: column;
      }

      .auth-left {
        min-height: 280px;
        padding: 48px 24px;
      }

      .auth-left h1 {
        font-size: 2rem;
      }

      .auth-left-desc {
        display: none;
      }

      .float-icon {
        display: none;
      }

      .auth-right {
        padding: 32px 24px;
      }
    }

    @media (max-width: 480px) {
      .auth-left {
        min-height: 220px;
        padding: 36px 20px;
      }

      .auth-left h1 {
        font-size: 1.6rem;
      }

      .auth-form-container {
        max-width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="auth-split">
    <!-- ═══════ LEFT PANEL ═══════ -->
    <div class="auth-left">
      <div class="auth-dots"></div>

      <!-- Floating icons -->
      <i class="fas fa-plane float-icon"></i>
      <i class="fas fa-map-marked-alt float-icon"></i>
      <i class="fas fa-compass float-icon"></i>
      <i class="fas fa-mountain float-icon"></i>
      <i class="fas fa-globe-americas float-icon"></i>

      <div class="auth-left-content">
        <div class="auth-left-logo">&#10022; Travel<span class="dot">Mate</span></div>
        <p class="auth-left-greeting">Nice to see you again</p>
        <h1>WELCOME BACK</h1>
        <p class="auth-left-desc">
          Login to access your personalized travel dashboard, connect with local guides, and continue exploring the world.
        </p>
      </div>

      <!-- Wave SVG -->
      <svg class="auth-wave" viewBox="0 0 1440 120" preserveAspectRatio="none">
        <path
          d="M0,80 C360,120 720,20 1080,80 C1260,110 1380,60 1440,80 L1440,120 L0,120 Z"
          fill="rgba(255,255,255,0.08)" />
        <path
          d="M0,100 C240,60 480,120 720,90 C960,60 1200,110 1440,90 L1440,120 L0,120 Z"
          fill="rgba(255,255,255,0.05)" />
      </svg>
    </div>

    <!-- ═══════ RIGHT PANEL ═══════ -->
    <div class="auth-right">
      <div class="auth-form-container">
        <h2 class="auth-form-title">Login <span>Account</span></h2>
        <p class="auth-form-subtitle">
          Enter your credentials to access your TravelMate account.
        </p>

        <!-- Error display -->
        <div class="auth-error-msg" id="loginError">
          <i class="fas fa-exclamation-circle"></i>
          <span id="loginErrorMsg"></span>
        </div>

        <!-- Role toggle -->
        <div class="role-toggle">
          <button type="button" class="role-btn active" onclick="selectRole(this, 'User')">
            <i class="fas fa-user"></i> User
          </button>
          <button type="button" class="role-btn" onclick="selectRole(this, 'Guide')">
            <i class="fas fa-map-marked-alt"></i> Guide
          </button>
          <button type="button" class="role-btn" id="adminRoleBtn" style="display:none;" onclick="selectRole(this, 'Admin')">
            <i class="fas fa-shield-alt"></i> Admin
          </button>
        </div>

        <form id="loginForm">
          <div class="form-group">
            <label>Email Address</label>
            <div class="input-wrap">
              <div class="input-bar"></div>
              <input type="email" id="email" placeholder="you@example.com" required>
            </div>
          </div>

          <div class="form-group">
            <label>Password</label>
            <div class="input-wrap">
              <div class="input-bar"></div>
              <input type="password" id="password" placeholder="password" required>
              <button type="button" class="toggle-pass" onclick="togglePassword()">Show</button>
            </div>
          </div>

          <div class="extras-row">
            <label class="keep-signed">
              <input type="checkbox" checked> Keep me signed in
            </label>
            <a href="#" class="forgot-link" onclick="simulateForgotPassword(event)">Forgot Password?</a>
          </div>

          <button type="submit" class="auth-btn" id="loginBtn">SIGN IN</button>
        </form>

        <div class="or-divider">OR</div>

        <!-- Google Sign-In button rendered by GSI (full-width) -->
        <div class="google-btn-wrap" id="googleBtnWrap"></div>

        <div class="auth-switch">
          Don't have an account? <a href="signup.html">Create Account</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    /* redirect away if already logged in */
    (function () {
      if (TmAuth.isLogged()) window.location.href = 'index.html';
    })();

    let selectedRole = 'User';

    function selectRole(btn, role) {
      document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedRole = role;
    }

    function togglePassword() {
      const pass = document.getElementById("password");
      const btn = pass.parentElement.querySelector('.toggle-pass');
      if (pass.type === "password") {
        pass.type = "text";
        btn.textContent = "Hide";
      } else {
        pass.type = "password";
        btn.textContent = "Show";
      }
    }

    function showError(msg) {
      const el = document.getElementById('loginError');
      document.getElementById('loginErrorMsg').textContent = msg;
      el.classList.add('show');
    }

    function hideError() {
      document.getElementById('loginError').classList.remove('show');
    }

    function showSuccess(msg) {
      if (window.TmToast) window.TmToast.show(msg, 'success');
      else alert(msg);
    }

    /* ── Login via API ── */
    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      hideError();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const submitBtn = document.getElementById('loginBtn');

      if (!email || !password) {
        showError('Please fill in all fields.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'SIGNING IN...';

      try {
        const res = await fetch('http://localhost:5000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, role: selectedRole })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.message || 'Login failed');
        }

        if (data.role !== 'Admin' && data.role.toLowerCase() !== selectedRole.toLowerCase() && data.role.toLowerCase() !== 'both') {
          throw new Error(`Login failed. You are registered as a ${data.role}, please select the correct role tab.`);
        }

        localStorage.setItem('tm_active_role', selectedRole);
        localStorage.setItem('token', data.token);

        TmAuth.login(data.full_name, data.email, data.role, null, data.token, data.id);
        showSuccess('Login successful! Redirecting...');

        // Role-based redirect
        if (data.role === 'Admin') {
          window.location.href = 'admin-dashboard.html';
        } else if (selectedRole === 'Guide') {
          window.location.href = 'guide-dashboard.html';
        } else {
          window.location.href = 'travel-mate-dashboard.html';
        }

      } catch (error) {
        showError(error.message);
        submitBtn.disabled = false;
        submitBtn.textContent = 'SIGN IN';
      }
    });

    // ── Google OAuth ──────────────────────────────────────────────────────────
    const GOOGLE_CLIENT_ID = '410963444859-hp8pq90ma485ejgjeschku36bte24ln8.apps.googleusercontent.com';

    // Called by Google after user picks an account
    window.handleGoogleCredential = async function(response) {
      const wrap = document.getElementById('googleBtnWrap');
      wrap.innerHTML = '<div style="text-align:center;padding:10px;font-size:13px;color:#64748b;">Signing in with Google...</div>';
      try {
        const res = await fetch('http://localhost:5000/api/auth/google', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ credential: response.credential })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Google login failed');

        localStorage.setItem('tm_active_role', data.role || 'User');
        localStorage.setItem('token', data.token);
        TmAuth.login(data.full_name, data.email, data.role || 'User', data.avatar || null, data.token, data.id);

        if (data.role === 'Admin') {
          window.location.href = 'admin-dashboard.html';
        } else if (data.role === 'Guide' || data.role === 'Both') {
          window.location.href = 'guide-dashboard.html';
        } else {
          window.location.href = 'travel-mate-dashboard.html';
        }
      } catch(err) {
        showError(err.message);
        initGoogleButton(); // Re-render the button on error
      }
    };

    function initGoogleButton() {
      const wrap = document.getElementById('googleBtnWrap');
      if (typeof google !== 'undefined' && google.accounts) {
        // Initialize GSI
        google.accounts.id.initialize({
          client_id: GOOGLE_CLIENT_ID,
          callback: handleGoogleCredential,
          auto_select: false,
          cancel_on_tap_outside: true,
          ux_mode: 'popup'
        });
        // Render the real Google button — full width of the container
        google.accounts.id.renderButton(wrap, {
          type: 'standard',
          theme: 'outline',
          size: 'large',
          text: 'continue_with',
          shape: 'rectangular',
          logo_alignment: 'left',
          width: wrap.offsetWidth || 368
        });
      } else {
        // Fallback if GSI script didn't load
        wrap.innerHTML = `
          <button class="google-btn-fallback" onclick="showError('Google Sign-In is not available. Make sure you are connected to the internet.')">
            <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="18" alt="Google">
            Continue with Google
          </button>`;
      }
    }

    // Try to init immediately, also on load (GSI may load before or after)
    if (document.readyState === 'complete') {
      initGoogleButton();
    } else {
      window.addEventListener('load', initGoogleButton);
    }
    // Retry after 1.5s if GSI loads late (async defer)
    setTimeout(initGoogleButton, 1500);

    function simulateForgotPassword(e) {
      e.preventDefault();
      const emailInput = document.getElementById('email')?.value.trim();
      if (!emailInput) {
        showError("Please enter your email address to reset your password.");
      } else {
        showSuccess("A password reset link has been sent to " + emailInput + "!");
      }
    }


    // Secret backdoor to show Admin tab (double click title)
    document.querySelector('.auth-form-title').addEventListener('dblclick', () => {
      document.getElementById('adminRoleBtn').style.display = 'flex';
    });
  </script>

</body>

</html>
